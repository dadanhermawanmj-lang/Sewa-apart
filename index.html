<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewa Apartemen Tangerang Harian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .swiper-button-next, .swiper-button-prev { color: #fff; transform: scale(0.5); }
        .swiper-pagination-bullet-active { background: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="font-black text-blue-600 text-xl">HARIAN APARTEMEN</div>
        <a href="https://wa.me/6285167055314" class="bg-green-500 text-white px-5 py-2 rounded-full font-bold text-sm">WhatsApp</a>
    </nav>

    <main class="container mx-auto py-6 px-4 space-y-10">
        
        <section class="bg-white rounded-3xl shadow-lg overflow-hidden border">
            <div class="swiper mySwiper h-80">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="IMG_7267.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="IMG_7270.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="IMG_7271.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="IMG_7272.jpeg" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="IMG_7273.jpeg" class="w-full h-full object-cover"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="p-6">
                <h2 class="text-2xl font-black mb-2">Sky House BSD</h2>
                <p class="text-slate-500 mb-6 text-sm">Unit mewah dengan view kota yang cakep banget. Full furnished dan bersih.</p>
                <button onclick="chatWA('Sky House BSD')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Booking Sekarang</button>
            </div>
        </section>

        <section class="bg-white rounded-3xl shadow-lg overflow-hidden border">
            <div class="swiper mySwiper h-80">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="image_1.png" class="w-full h-full object-cover"></div>
                    <div class="swiper-slide"><img src="image_2.png" class="w-full h-full object-cover"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="p-6">
                <h2 class="text-2xl font-black mb-2">Collins / Treepark</h2>
                <p class="text-slate-500 mb-6 text-sm">Unit aesthetic lainnya di lokasi strategis Tangerang.</p>
                <button onclick="chatWA('Unit Tangerang')" class="w-full border-2 border-slate-900 py-3 rounded-xl font-bold">Cek Ketersediaan</button>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            pagination: { el: ".swiper-pagination", clickable: true },
            autoplay: { delay: 3000 },
        });

        function chatWA(unit) {
            window.open(`https://wa.me/6285167055314?text=Halo Admin, saya mau sewa unit ${unit}`, '_blank');
        }
    </script>
</body>
</html>
